<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private IPTV Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #27272a; border-radius: 20px; }
    .modal-enter { animation: zoomIn 0.2s ease-out forwards; }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-indigo-500/30 flex flex-col min-h-screen">

  <!-- Header -->
  <header class="px-6 py-5 flex justify-between items-center z-10 sticky top-0 bg-zinc-950/80 backdrop-blur-2xl">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-2xl bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-600/20">
        <i data-lucide="tv" class="w-5 h-5"></i>
      </div>
      <h1 class="text-2xl font-black tracking-tight text-white">Manager</h1>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="openSettings()" class="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-white transition-all active:scale-95">
        <i data-lucide="settings" class="w-5 h-5"></i>
      </button>
      <button onclick="loadPlaylist()" id="btn-fetch" class="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 px-5 py-2.5 rounded-full text-sm font-semibold transition-all active:scale-95 disabled:opacity-50">
        <i data-lucide="download" class="w-4 h-4"></i> <span>Fetch</span>
      </button>
      <button onclick="savePlaylist()" id="btn-sync" class="flex items-center gap-2 bg-white text-black hover:bg-zinc-200 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 disabled:opacity-50 shadow-xl shadow-white/5" disabled>
        <i data-lucide="upload" class="w-4 h-4"></i> <span>Sync</span>
      </button>
    </div>
  </header>

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 opacity-0 pointer-events-none transform -translate-y-4">
    <div id="toast-content" class="px-6 py-3 rounded-full text-sm font-bold shadow-2xl backdrop-blur-xl border flex items-center gap-2">
    </div>
  </div>

  <!-- Main Workspace -->
  <main class="flex-1 flex flex-col max-w-[1600px] w-full mx-auto px-6 pb-6 overflow-hidden">
    
    <!-- Toolbar -->
    <div class="flex flex-col md:flex-row gap-4 items-center mb-8 mt-2">
      <div class="relative flex-1 w-full max-w-xl group">
        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 w-5 h-5 group-focus-within:text-indigo-400 transition-colors"></i>
        <input type="text" id="search-input" placeholder="Search streams..." class="w-full bg-zinc-900 border-2 border-transparent focus:border-indigo-500/50 rounded-2xl pl-12 pr-6 py-3.5 text-base font-medium placeholder:text-zinc-600 focus:outline-none transition-all" oninput="handleSearch(event)">
      </div>
      <div class="relative w-full md:w-auto flex-shrink-0">
        <i data-lucide="list-filter" class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 w-4 h-4 pointer-events-none"></i>
        <select id="group-select" class="w-full md:w-auto bg-zinc-900 border-none rounded-2xl pl-12 pr-12 py-3.5 text-base font-medium appearance-none focus:ring-2 focus:ring-indigo-500 focus:outline-none cursor-pointer hover:bg-zinc-800 transition-colors" onchange="handleGroupChange(event)">
          <option value="All">All</option>
        </select>
      </div>
      <div id="selection-actions" class="flex-1 flex justify-end items-center gap-4 w-full md:w-auto hidden">
        <div class="flex items-center gap-3">
          <span id="selected-count" class="text-sm font-bold text-zinc-400">0 Selected</span>
          <button onclick="deleteSelected()" class="flex items-center gap-2 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-5 py-3 rounded-2xl text-sm font-bold transition-all active:scale-95">
            <i data-lucide="trash-2" class="w-4 h-4"></i> <span class="hidden sm:inline">Delete</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Content Area -->
    <div id="grid-container" class="flex-1 overflow-y-auto pb-20 custom-scrollbar">
        
        <!-- Empty State -->
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center max-w-sm mx-auto">
          <div class="w-24 h-24 bg-zinc-900 rounded-full flex items-center justify-center mb-6">
            <i data-lucide="tv" class="w-10 h-10 text-zinc-700"></i>
          </div>
          <h2 class="text-2xl font-bold mb-2">No Streams Found</h2>
          <p class="text-zinc-500 mb-8 leading-relaxed">Connect your Dropbox and load your M3U playlist to start organizing your IPTV network.</p>
          <button onclick="openSettings()" class="bg-white text-black px-6 py-3 rounded-full font-bold active:scale-95 transition-all">
            Configure Connection
          </button>
        </div>
        
        <!-- Loading State -->
        <div id="loading-state" class="hidden h-full flex flex-col items-center justify-center text-zinc-500 gap-4">
          <div class="w-10 h-10 border-4 border-zinc-800 border-t-indigo-600 rounded-full animate-spin"></div>
          <p class="font-medium tracking-wide">Syncing with Dropbox...</p>
        </div>

        <!-- Channels Grid -->
        <div id="channels-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
           <!-- Dynamically populated by JavaScript -->
        </div>
    </div>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-md hidden">
    <div class="bg-zinc-900 w-full max-w-lg rounded-[2rem] p-8 shadow-2xl relative modal-enter">
      <button onclick="closeSettings()" class="absolute top-6 right-6 p-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-zinc-400 hover:text-white transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
      <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 bg-blue-500/10 text-blue-500 rounded-2xl flex items-center justify-center">
          <i data-lucide="settings" class="w-6 h-6"></i>
        </div>
        <div>
          <h2 class="text-xl font-black">Configuration</h2>
          <p class="text-sm text-zinc-400 font-medium">Connect your local client</p>
        </div>
      </div>
      <div class="bg-indigo-500/10 border border-indigo-500/20 rounded-2xl p-4 mb-8 flex gap-3 text-indigo-300">
        <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i>
        <p class="text-sm font-medium leading-relaxed">
          Tokens are stored securely in your browser's <span class="text-indigo-200 font-bold">local storage</span>. No backend servers are involved.
        </p>
      </div>
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-bold mb-2 text-zinc-300 pl-1">Dropbox Access Token</label>
          <input type="password" id="input-token" class="w-full bg-zinc-950 border-none rounded-2xl p-4 text-base focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all placeholder:text-zinc-700" placeholder="sl.B...">
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-zinc-300 pl-1">File Path in Dropbox</label>
          <input type="text" id="input-path" class="w-full bg-zinc-950 border-none rounded-2xl p-4 text-base focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all placeholder:text-zinc-700" placeholder="/premium_list.m3u">
        </div>
        <button onclick="saveSettings()" class="w-full bg-white hover:bg-zinc-200 text-black py-4 rounded-2xl text-base font-bold transition-all active:scale-[0.98] mt-4">
          Save & Continue
        </button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-md hidden">
    <div class="bg-zinc-900 w-full max-w-md rounded-[2rem] p-8 shadow-2xl relative modal-enter">
      <h3 class="text-xl font-black mb-6">Edit Stream</h3>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-bold mb-2 text-zinc-300 pl-1">Stream Name</label>
          <input type="text" id="edit-name" class="w-full bg-zinc-950 border-none rounded-2xl p-4 text-base focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all">
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-zinc-300 pl-1">Category / Group</label>
          <input type="text" id="edit-group" class="w-full bg-zinc-950 border-none rounded-2xl p-4 text-base focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all">
        </div>
      </div>
      <div class="flex gap-3 mt-8">
        <button onclick="closeEdit()" class="flex-1 py-4 rounded-2xl text-sm font-bold text-zinc-300 bg-zinc-800 hover:bg-zinc-700 transition-colors">Cancel</button>
        <button onclick="saveEdit()" class="flex-[2] py-4 rounded-2xl text-sm font-bold bg-indigo-600 hover:bg-indigo-500 text-white transition-colors">Confirm Changes</button>
      </div>
    </div>
  </div>

  <!-- Core Logic Script -->
  <script>
    // App State
    let state = {
        token: localStorage.getItem('dropbox_token') || '',
        filePath: localStorage.getItem('dropbox_filepath') || '/playlist.m3u',
        channels: [],
        search: '',
        selectedGroup: 'All',
        selectedChannels: new Set(),
        editingChannelId: null
    };

    // Initialize UI Icons
    lucide.createIcons();

    // Setup initial fields
    document.getElementById('input-token').value = state.token;
    document.getElementById('input-path').value = state.filePath;
    if (!state.token) openSettings();

    // M3U Processing
    function parseM3U(text) {
      const lines = text.split(/\r?\n/);
      const channels = [];
      let currentChannel = {};

      if (!lines[0].startsWith('#EXTM3U')) throw new Error("Invalid M3U: Missing #EXTM3U header");

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        if (line.startsWith('#EXTINF:')) {
          currentChannel = { rawExtinf: line, id: crypto.randomUUID() };
          const commaIndex = line.lastIndexOf(',');
          currentChannel.name = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : 'Unknown';
          const groupMatch = line.match(/group-title="([^"]*)"/);
          currentChannel.group = groupMatch ? groupMatch[1] : 'Uncategorized';
        } else if (line.startsWith('#EXTGRP:')) {
          currentChannel.group = line.substring(8).trim();
        } else if (!line.startsWith('#')) {
          if (currentChannel.name) {
            currentChannel.url = line;
            channels.push(currentChannel);
            currentChannel = {}; 
          }
        }
      }
      return channels;
    }

    function generateM3U(channels) {
      let text = '#EXTM3U\n';
      channels.forEach(ch => {
        let extinf = ch.rawExtinf;
        if (extinf.includes('group-title="')) {
          extinf = extinf.replace(/group-title="[^"]*"/, `group-title="${ch.group}"`);
        } else {
          extinf = extinf.replace('#EXTINF:-1 ', `#EXTINF:-1 group-title="${ch.group}" `);
        }
        const commaIndex = extinf.lastIndexOf(',');
        if (commaIndex !== -1) {
          extinf = extinf.substring(0, commaIndex + 1) + ch.name;
        }
        text += extinf + '\n' + ch.url + '\n';
      });
      return text;
    }

    // Dropbox API
    async function loadPlaylist() {
        if (!state.token || !state.filePath) return openSettings();
        
        showLoading(true);
        try {
            const response = await fetch('https://content.dropboxapi.com/2/files/download', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${state.token}`,
                    'Dropbox-API-Arg': JSON.stringify({ path: state.filePath })
                }
            });
            
            if (!response.ok) throw new Error(await response.text());
            
            const text = await response.text();
            state.channels = parseM3U(text);
            state.selectedChannels.clear();
            
            updateGroups();
            renderGrid();
            showToast(`Successfully parsed ${state.channels.length} streams.`);
        } catch (err) {
            console.error(err);
            showToast('Error: Check token and path.', true);
        } finally {
            showLoading(false);
        }
    }

    async function savePlaylist() {
        if (!state.token || state.channels.length === 0) return;
        
        showLoading(true);
        try {
            const m3uText = generateM3U(state.channels);
            const response = await fetch('https://content.dropboxapi.com/2/files/upload', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${state.token}`,
                    'Dropbox-API-Arg': JSON.stringify({ path: state.filePath, mode: 'overwrite' }),
                    'Content-Type': 'application/octet-stream'
                },
                body: m3uText
            });
            
            if (!response.ok) throw new Error(await response.text());
            
            showToast('Cloud sync complete.');
            state.selectedChannels.clear();
            renderGrid();
        } catch (err) {
            console.error(err);
            showToast('Sync failed.', true);
        } finally {
            showLoading(false);
        }
    }

    // UI Rendering
    function getFilteredChannels() {
        return state.channels.filter(c => {
            const matchGroup = state.selectedGroup === 'All' || c.group === state.selectedGroup;
            const matchSearch = c.name.toLowerCase().includes(state.search.toLowerCase());
            return matchGroup && matchSearch;
        });
    }

    function renderGrid() {
        const grid = document.getElementById('channels-grid');
        const empty = document.getElementById('empty-state');
        
        if (state.channels.length === 0) {
            grid.classList.add('hidden');
            empty.classList.remove('hidden');
            document.getElementById('btn-sync').disabled = true;
            return;
        }

        empty.classList.add('hidden');
        grid.classList.remove('hidden');
        document.getElementById('btn-sync').disabled = false;

        const filtered = getFilteredChannels();
        const allSelected = filtered.length > 0 && Array.from(filtered).every(c => state.selectedChannels.has(c.id));

        let html = `
            <div onclick="toggleSelectAll()" class="col-span-full mb-2 flex items-center gap-3 cursor-pointer group w-max">
               <div class="w-6 h-6 rounded-md flex items-center justify-center transition-colors ${allSelected ? 'bg-indigo-600 text-white' : 'bg-zinc-800 text-transparent group-hover:bg-zinc-700'}">
                  <i data-lucide="check" class="w-4 h-4" stroke-width="3"></i>
               </div>
               <span class="font-bold text-sm text-zinc-400 group-hover:text-zinc-200 transition-colors">
                 Select All in ${state.selectedGroup}
               </span>
            </div>
        `;

        filtered.forEach(channel => {
            const isSelected = state.selectedChannels.has(channel.id);
            const escapedName = channel.name.replace(/"/g, '&quot;');
            
            html += `
                <div onclick="toggleSelection('${channel.id}')" class="relative p-5 rounded-3xl cursor-pointer transition-all duration-200 flex flex-col justify-between min-h-[140px] group ${isSelected ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20 scale-[0.98]' : 'bg-zinc-900 hover:bg-zinc-800 text-zinc-100'}">
                  <div class="flex items-start justify-between gap-3 mb-4">
                    <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 transition-colors ${isSelected ? 'bg-white text-indigo-600' : 'bg-zinc-800 text-transparent'}">
                      <i data-lucide="check" class="w-3.5 h-3.5" stroke-width="4"></i>
                    </div>
                    <button onclick="openEdit(event, '${channel.id}')" class="p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all ${isSelected ? 'hover:bg-indigo-500 text-indigo-200 hover:text-white' : 'hover:bg-zinc-700 text-zinc-500 hover:text-white'}">
                      <i data-lucide="edit-2" class="w-4 h-4"></i>
                    </button>
                  </div>
                  <div>
                    <h3 class="font-bold text-base leading-tight mb-2 line-clamp-2 pr-2" title="${escapedName}">${channel.name}</h3>
                    <span class="${isSelected ? 'bg-indigo-500/50 text-indigo-50' : 'bg-zinc-950 text-zinc-400'} inline-block px-3 py-1 rounded-full text-xs font-bold tracking-wide truncate max-w-full">
                      ${channel.group}
                    </span>
                  </div>
                </div>
            `;
        });

        grid.innerHTML = html;
        lucide.createIcons();
        updateToolbar();
    }

    function updateGroups() {
        const groups = new Set(state.channels.map(c => c.group));
        const sorted = ['All', ...Array.from(groups).sort()];
        const select = document.getElementById('group-select');
        select.innerHTML = sorted.map(g => `<option value="${g}">${g}</option>`).join('');
        select.value = state.selectedGroup;
    }

    function updateToolbar() {
        const actions = document.getElementById('selection-actions');
        if (state.selectedChannels.size > 0) {
            actions.classList.remove('hidden');
            document.getElementById('selected-count').innerText = `${state.selectedChannels.size} Selected`;
        } else {
            actions.classList.add('hidden');
        }
    }

    // UI Interactions
    function handleSearch(e) {
        state.search = e.target.value;
        renderGrid();
    }

    function handleGroupChange(e) {
        state.selectedGroup = e.target.value;
        renderGrid();
    }

    function toggleSelection(id) {
        if (state.selectedChannels.has(id)) state.selectedChannels.delete(id);
        else state.selectedChannels.add(id);
        renderGrid();
    }

    function toggleSelectAll() {
        const filtered = getFilteredChannels();
        const allSelected = filtered.length > 0 && Array.from(filtered).every(c => state.selectedChannels.has(c.id));
        
        if (allSelected) {
            state.selectedChannels.clear();
        } else {
            filtered.forEach(c => state.selectedChannels.add(c.id));
        }
        renderGrid();
    }

    function deleteSelected() {
        if (!confirm(`Delete ${state.selectedChannels.size} channels forever?`)) return;
        state.channels = state.channels.filter(c => !state.selectedChannels.has(c.id));
        state.selectedChannels.clear();
        updateGroups();
        renderGrid();
    }

    // Modals & States
    function showLoading(isLoading) {
        const empty = document.getElementById('empty-state');
        const loading = document.getElementById('loading-state');
        const grid = document.getElementById('channels-grid');
        
        document.getElementById('btn-fetch').disabled = isLoading;
        
        if (isLoading) {
            empty.classList.add('hidden');
            grid.classList.add('hidden');
            loading.classList.remove('hidden');
        } else {
            loading.classList.add('hidden');
        }
    }

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        const content = document.getElementById('toast-content');
        
        content.className = `px-6 py-3 rounded-full text-sm font-bold shadow-2xl backdrop-blur-xl border flex items-center gap-2 ${isError ? 'bg-red-500/10 border-red-500/20 text-red-400' : 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400'}`;
        content.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check'}" class="w-4 h-4"></i> ${msg}`;
        
        toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
        lucide.createIcons();
        
        setTimeout(() => {
            toast.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
        }, 3000);
    }

    function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
    function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
    
    function saveSettings() {
        state.token = document.getElementById('input-token').value;
        state.filePath = document.getElementById('input-path').value;
        localStorage.setItem('dropbox_token', state.token);
        localStorage.setItem('dropbox_filepath', state.filePath);
        closeSettings();
        showToast('Credentials saved locally.');
    }

    function openEdit(e, id) {
        e.stopPropagation();
        const channel = state.channels.find(c => c.id === id);
        if (!channel) return;
        state.editingChannelId = id;
        document.getElementById('edit-name').value = channel.name;
        document.getElementById('edit-group').value = channel.group;
        document.getElementById('edit-modal').classList.remove('hidden');
    }

    function closeEdit() {
        state.editingChannelId = null;
        document.getElementById('edit-modal').classList.add('hidden');
    }

    function saveEdit() {
        const channel = state.channels.find(c => c.id === state.editingChannelId);
        if (channel) {
            channel.name = document.getElementById('edit-name').value;
            channel.group = document.getElementById('edit-group').value;
            updateGroups();
            renderGrid();
        }
        closeEdit();
    }
  </script>
</body>
</html>
